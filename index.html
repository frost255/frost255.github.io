<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speed Math Game</title>

<style>

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
    font-size: 24px;
    background-color: #f7fafc; /* เปลี่ยนพื้นหลังเป็นสีเทาอมฟ้าอ่อนๆ */
    color: #2d3748; /* สีตัวอักษรเข้มแบบนุ่มนวล */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    max-width: 500px;
    width: 100%;
    position: relative;
    background: #ffffff; /* กล่องเกมสีขาวสะอาด */
    padding: 30px;
    border-radius: 24px; /* ขอบมนโค้งสไตล์แอปโมเดิร์น */
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); /* เงาบางๆ นุ่มๆ */
    box-sizing: border-box;
}

.hidden {
    display: none;
}

/* สไตล์ปุ่มกดทั่วไป */
button {
    padding: 12px 20px;
    margin: 6px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    border-radius: 14px;
    border: none;
    background-color: #edf2f7;
    color: #4a5568;
    transition: all 0.2s ease; /* เอฟเฟกต์ตอนกด/ชี้ */
}

button:hover {
    background-color: #e2e8f0;
    transform: translateY(-2px); /* ปุ่มลอยขึ้นเล็กน้อยตอนชี้ */
}

button:active {
    transform: translateY(0);
}

/* ช่องแสดงคำตอบ */
input {
    padding: 16px;
    width: 100%;
    font-size: 26px;
    text-align: center;
    border-radius: 16px;
    border: 2px solid #e2e8f0;
    background-color: #f8fafc;
    color: #2d3748;
    box-sizing: border-box;
    font-weight: bold;
    letter-spacing: 2px;
}

/* ส่วนแสดงตัวเลขและเป้าหมาย */
.numbers {
    font-size: 32px;
    margin: 20px 0;
    font-weight: bold;
}
#nums { color: #3182ce; } /* เลขคำถามสีฟ้า */
#target { color: #e53e3e; font-size: 40px; } /* เลขเป้าหมายสีแดงเด่นๆ */

/* แยกสไตล์ปุ่มเครื่องหมาย */
.symbols button {
    background-color: #feebc8; /* สีส้มพาสเทล */
    color: #c05621;
    width: 22%;
}
.symbols button:hover { background-color: #fbd38d; }

/* แยกสไตล์ปุ่มตัวเลข */
.numberPad button {
    background-color: #ebf8ff; /* สีฟ้าพาสเทล */
    color: #2b6cb0;
    width: 22%;
}
.numberPad button:hover { background-color: #bee3f8; }

/* ปุ่มลบตัวเลข */
.numberPad button:last-child {
    background-color: #fed7d7; /* สีแดงพาสเทล */
    color: #9b2c2c;
}
.numberPad button:last-child:hover { background-color: #feb2b2; }

/* ปุ่ม Submit ส่งคำตอบ */
button[onclick="submitAnswer()"] {
    width: 100%;
    margin: 20px 0 0 0;
    background-color: #48bb78; /* สีเขียว */
    color: white;
    padding: 16px;
    font-size: 24px;
    box-shadow: 0 4px 12px rgba(72, 187, 120, 0.3);
}
button[onclick="submitAnswer()"]:hover {
    background-color: #38a169;
}

/* ปุ่ม Back */
#backBtn {
    position: absolute;
    top: 15px;
    left: 15px;
    font-size: 16px;
    padding: 8px 14px;
    background: transparent;
    color: #a0aec0;
}
#backBtn:hover {
    color: #4a5568;
    background: #edf2f7;
}

/* โหมดมือถือ */
@media (max-width:600px) {
    body { padding: 10px; }
    .container { padding: 20px; border-radius: 16px; }
    .numbers { font-size: 24px; }
    #target { font-size: 32px; }
    input { font-size: 22px; padding: 12px; }
    button { font-size: 18px; padding: 10px; margin: 4px; }
    .symbols button, .numberPad button { width: 22%; }

}



</style>
</head>

<body>

<div class="container">

<h1 id="title">⚡ Speed Math Game</h1>

<div id="menu">
<h2>Select Mode</h2>
<button onclick="startNormal()">Normal Mode</button>
<button onclick="startAdvanced()">Advanced Mode</button>
</div>

<div id="game" class="hidden">

<button id="backBtn" onclick="goBack()">⬅ Back</button>

<div class="numbers">
Numbers: <span id="nums"></span>
</div>

<div class="numbers">
Target: <span id="target"></span>
</div>

<p>
Time left: <span id="time">60</span>s
</p>

<p>
Score: <span id="score">0</span>
</p>

<input id="answer" readonly>

<br>

<div class="symbols" id="symbols"></div>

<div class="numberPad" id="numberPad"></div>

<br>
<button onclick="submitAnswer()">Submit</button>

<p id="result"></p>

</div>

</div>

<script>

let numbers=[]
let target=0
let timeLeft=60
let timer

let finalDiff=null
let playerValue=null
let answered=false
let mode="normal"

let score=0

function startNormal(){
mode="normal"
startGame(4,10,99)
}

function startAdvanced(){
mode="advanced"
startGame(5,100,999)
}

function startGame(count,minTarget,maxTarget){

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

if(window.innerWidth<=600){
document.getElementById("title").style.display="none"
}

numbers=[]

for(let i=0;i<count;i++){
numbers.push(Math.floor(Math.random()*9)+1)
}

target=Math.floor(Math.random()*(maxTarget-minTarget+1))+minTarget

document.getElementById("nums").textContent=numbers.join(", ")
document.getElementById("target").textContent=target

document.getElementById("answer").value=""
document.getElementById("result").textContent=""

setupSymbols()
setupNumbers()

timeLeft=(mode==="advanced")?90:60

answered=false
finalDiff=null
playerValue=null

document.getElementById("time").textContent=timeLeft
document.getElementById("score").textContent=score

clearInterval(timer)

timer=setInterval(()=>{

timeLeft--

document.getElementById("time").textContent=timeLeft

if(timeLeft<=0){
clearInterval(timer)
endGame()
}

},1000)

}

function setupSymbols(){

let symbolsDiv=document.getElementById("symbols")
symbolsDiv.innerHTML=""

let baseSymbols=["+","-","*","/","^","(",")"]

baseSymbols.forEach(sym=>{
symbolsDiv.innerHTML+=`<button onclick="addSymbol('${sym}')">${sym}</button>`
})

if(mode==="advanced"){

symbolsDiv.innerHTML+=`<button onclick="addSymbol('!')">!</button>`
symbolsDiv.innerHTML+=`<button onclick="addSymbol('√')">√</button>`

}

}

function setupNumbers(){

let pad=document.getElementById("numberPad")
pad.innerHTML=""

for(let i=1;i<=9;i++){
pad.innerHTML+=`<button onclick="addSymbol('${i}')">${i}</button>`
}

pad.innerHTML+=`<button onclick="deleteOne()">⌫</button>`

}

function addSymbol(symbol){
document.getElementById("answer").value+=symbol
}

function deleteOne(){
let box=document.getElementById("answer")
box.value=box.value.slice(0,-1)
}

function factorial(n){

if(n<0||n>6) throw "Invalid"

let r=1
for(let i=2;i<=n;i++) r*=i

return r
}

function validateNumbers(input){

let used=input.match(/\d+/g)

if(!used) return false

let temp=[...numbers]

for(let num of used){

let index=temp.indexOf(parseInt(num))

if(index===-1) return false

temp.splice(index,1)

}

return temp.length===0

}

function submitAnswer(){

if(answered) return

let input=document.getElementById("answer").value

if(!validateNumbers(input)){

document.getElementById("result").textContent=
"❌ Use each number exactly once!"

return
}

if(mode==="advanced"){

if((input.match(/!/g)||[]).length>1 ||
(input.match(/√/g)||[]).length>1){

document.getElementById("result").textContent=
"❌ Only one ! and one √ allowed!"

return

}

input=input.replace(/√(\d+)/g,"Math.sqrt($1)")
input=input.replace(/(\d+)!/g,"factorial($1)")

}

try{

input=input.replace(/\^/g,"**")

let value=eval(input)

playerValue=value

finalDiff=Math.abs(target-value)

answered=true

clearInterval(timer)

endGame()

}catch{

document.getElementById("result").textContent="Invalid expression!"

}

}

function endGame(){

let text=""

if(finalDiff===null){

text="⏰ Time's up!"

}else{

let roundScore=Math.max(0,100-finalDiff)

if(finalDiff===0){
roundScore+=50
text="🎯 PERFECT!"
}

score=roundScore

text+="<br>Your answer: "+playerValue
text+="<br>Target: "+target
text+="<br>Difference: "+finalDiff
text+="<br>Score: "+roundScore

}

document.getElementById("score").textContent=score

document.getElementById("result").innerHTML=
text+
"<br><br><button onclick='playAgain()'>🔁 Play Again</button>"

}

function playAgain(){

if(mode==="advanced"){
startAdvanced()
}else{
startNormal()
}

}

function goBack(){

if(confirm("Return to lobby? Your score will reset.")){

clearInterval(timer)

score=0

document.getElementById("game").classList.add("hidden")
document.getElementById("menu").classList.remove("hidden")

if(window.innerWidth<=600){
document.getElementById("title").style.display="block"
}

}

}

</script>

</body>
</html>
