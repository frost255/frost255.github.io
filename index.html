<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Math Game - 1v1 Mode</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            font-size: 22px;
        }

        button {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin: 6px;
            transition: 0.2s;
        }

        button:hover {
            background: #e6b800;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input#answer {
            padding: 14px;
            font-size: 22px;
            border-radius: 8px;
            border: 2px solid #ffcc00;
            background: #222;
            color: #fff;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        input#room-code-input {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid #ffcc00;
            background: #222;
            color: #fff;
            text-align: center;
            width: 150px;
        }

        .screen {
            display: none;
            max-width: 600px;
            margin: 30px auto;
            background: #1e1e1e;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .active {
            display: block;
        }

        .numbers {
            font-size: 32px;
            margin: 16px 0;
            color: #ffcc00;
        }

        .symbols button,
        .numberPad button {
            background: #333;
            color: #fff;
            border: 2px solid #555;
            min-width: 52px;
        }

        .symbols button:hover,
        .numberPad button:hover {
            background: #444;
            transform: none;
        }

        #countdown-number {
            font-size: 120px;
            color: #ffcc00;
            animation: pulse 1s infinite;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            font-size: 16px;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }

        #game-msg {
            color: #ff5555;
            min-height: 24px;
            font-size: 16px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            body { font-size: 18px; padding: 12px; }
            button { font-size: 16px; padding: 10px 14px; margin: 4px; }
            .symbols button, .numberPad button { width: 28%; font-size: 18px; }
            input#answer { font-size: 18px; }
            .numbers { font-size: 26px; }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- หน้า 1: เลือกโหมด -->
    <div id="screen-mode" class="screen active">
        <h1>⚡ Speed Math Game</h1>
        <h2>เลือกโหมด</h2>
        <button onclick="selectMode('normal')">Normal Mode</button>
        <button onclick="selectMode('advanced')">Advanced Mode</button>
        <p style="color:#aaa; font-size:14px;">
            Normal: สุ่ม 4 ตัว | + − × ÷ ^ | 60 วิ<br>
            Advanced: สุ่ม 5 ตัว | + − × ÷ ^ √ ! | 100 วิ
        </p>
    </div>

    <!-- หน้า 2: เลือกเล่นคนเดียว / 1v1 -->
    <div id="screen-player-type" class="screen">
        <h2 id="title-selected-mode"></h2>
        <button onclick="selectPlayerType('single')">เล่นคนเดียว (Single Player)</button>
        <button onclick="selectPlayerType('1v1')">สู้กัน 1v1 (Multiplayer)</button>
        <br>
        <button onclick="changeScreen('screen-mode')">⬅ Back</button>
    </div>

    <!-- หน้า 3: สร้าง/เข้าห้อง -->
    <div id="screen-room-setup" class="screen">
        <h2>🎮 1v1 Matchmaking</h2>
        <button onclick="createNewRoom()">สร้างห้องใหม่</button>
        <p style="color:#aaa;">— หรือ —</p>
        <input type="text" id="room-code-input" maxlength="4" placeholder="รหัส 4 หลัก">
        <button onclick="joinRoom()">เข้าห้อง</button>
        <br><br>
        <button onclick="changeScreen('screen-player-type')">⬅ Back</button>
    </div>

    <!-- หน้า 4: ลobby -->
    <div id="screen-lobby" class="screen">
        <h2>🏠 Room: <span id="display-room-code" style="color:#ffcc00;">XXXX</span></h2>
        <p id="lobby-status" style="color:#aaa;">กำลังรอผู้เล่นคนที่ 2...</p>
        <button id="start-game-btn" style="display:none;" onclick="hostTriggerStart()">เริ่มเกม!</button>
        <br>
        <button onclick="leaveRoom()">ออกจากห้อง</button>
    </div>

    <!-- หน้า 5: นับถอยหลัง -->
    <div id="screen-countdown" class="screen">
        <h2>เตรียมตัว!</h2>
        <div id="countdown-number">3</div>
    </div>

    <!-- หน้า 6: เล่นเกม -->
    <div id="screen-game" class="screen">
        <div class="numbers">ตัวเลข: <span id="nums"></span></div>
        <div class="numbers">เป้าหมาย: <span id="target"></span></div>
        <p>เวลาเหลือ: <span id="time">60</span> วิ</p>

        <input id="answer" readonly placeholder="สร้างสมการที่ใกล้เป้าหมายที่สุด">

        <div class="symbols" id="symbols"></div>
        <div class="numberPad" id="numberPad"></div>

        <br>
        <button id="submit-btn" onclick="submitAnswer()">ส่งคำตอบ (Submit)</button>
        <p id="game-msg"></p>

        <div class="score-board">
            <div>คุณ: <span id="my-status">⏳ กำลังคิด...</span></div>
            <div>คู่ต่อสู้: <span id="opponent-status">—</span></div>
        </div>
    </div>

    <!-- หน้า 7: ผลลัพธ์ -->
    <div id="screen-result" class="screen">
        <h2>🏆 ผลการแข่งขัน</h2>
        <h1 id="result-text" style="color:#ffcc00;"></h1>
        <div id="result-details" style="font-size:17px; line-height:1.7; margin:20px 0;"></div>
        <button onclick="backToMenu()">กลับหน้าหลัก</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCHC4XKZPnMFT_6meVFb4NDO3bk-tZxUIs",
            authDomain: "frost255.firebaseapp.com",
            databaseURL: "https://frost255-default-rtdb.firebaseio.com",
            projectId: "frost255",
            storageBucket: "frost255.firebasestorage.app",
            messagingSenderId: "669751261090",
            appId: "1:669751261090:web:d1d13219a7aba6bedee4fb"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentMode = 'normal';
        let isMultiplayer = false;
        let roomCode = '';
        let myRole = '';
        let isHost = false;

        let numbers = [];
        let target = 0;
        let timeLeft = 60;
        let gameTimer = null;
        let answered = false;
        let myResult = null; // ค่าที่คำนวณได้
        let countdownRunning = false;

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function selectMode(mode) {
            currentMode = mode;
            document.getElementById('title-selected-mode').innerText =
                mode === 'normal' ? '💎 Normal Mode (4 ตัว, 60 วิ)' : '🔥 Advanced Mode (5 ตัว, 100 วิ)';
            changeScreen('screen-player-type');
        }

        function selectPlayerType(type) {
            if (type === 'single') {
                isMultiplayer = false;
                startSinglePlayerGame();
            } else {
                isMultiplayer = true;
                changeScreen('screen-room-setup');
            }
        }

        function getGameSettings() {
            if (currentMode === 'normal') {
                return { count: 4, minTarget: 10, maxTarget: 99, time: 60 };
            }
            return { count: 5, minTarget: 100, maxTarget: 999, time: 100 };
        }

        function generateNumbers(count) {
            const arr = [];
            for (let i = 0; i < count; i++) {
                arr.push(Math.floor(Math.random() * 9) + 1);
            }
            return arr;
        }

        function generateTarget(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // ── Firebase Multiplayer ──

        function generateRoomCode() {
            return Math.floor(1000 + Math.random() * 9000).toString();
        }

        function createNewRoom() {
            roomCode = generateRoomCode();
            myRole = 'host';
            isHost = true;

            db.ref('rooms/' + roomCode).set({
                mode: currentMode,
                status: 'waiting',
                hostPresent: true,
                guestPresent: false,
                target: 0,
                numbers: '',
                hostAnswer: -999,
                guestAnswer: -999,
                hostExpr: '',
                guestExpr: ''
            }).then(() => {
                document.getElementById('display-room-code').innerText = roomCode;
                document.getElementById('lobby-status').innerText = 'กำลังรอผู้เล่นคนที่ 2...';
                document.getElementById('start-game-btn').style.display = 'none';
                changeScreen('screen-lobby');
                listenToRoom();
            });
        }

        function joinRoom() {
            const input = document.getElementById('room-code-input').value.trim();
            if (input.length !== 4) return alert('กรุณาใส่รหัสห้อง 4 หลัก');

            roomCode = input;
            myRole = 'guest';
            isHost = false;

            db.ref('rooms/' + roomCode).once('value', snap => {
                if (!snap.exists()) return alert('ไม่พบห้องนี้');
                const data = snap.val();
                if (data.status !== 'waiting') return alert('ห้องนี้เริ่มเกมแล้วหรือเต็มแล้ว');

                currentMode = data.mode;
                db.ref('rooms/' + roomCode).update({ guestPresent: true, status: 'ready' }).then(() => {
                    document.getElementById('display-room-code').innerText = roomCode;
                    document.getElementById('lobby-status').innerText = 'เชื่อมต่อแล้ว! รอเจ้าของห้องเริ่มเกม...';
                    document.getElementById('start-game-btn').style.display = 'none';
                    changeScreen('screen-lobby');
                    listenToRoom();
                });
            });
        }

        function listenToRoom() {
            db.ref('rooms/' + roomCode).on('value', snap => {
                if (!snap.exists()) return;
                const data = snap.val();

                if (myRole === 'host') {
                    if (data.status === 'ready') {
                        document.getElementById('lobby-status').innerText = 'ผู้เล่นคนที่ 2 พร้อมแล้ว!';
                        document.getElementById('start-game-btn').style.display = 'inline-block';
                    } else if (data.status === 'waiting') {
                        document.getElementById('lobby-status').innerText = 'กำลังรอผู้เล่นคนที่ 2...';
                        document.getElementById('start-game-btn').style.display = 'none';
                    }
                }

                if (data.status === 'countdown' && !countdownRunning) {
                    runCountdown(data.target, data.numbers.split(',').map(Number));
                }

                if (data.status === 'playing') {
                    const oppDone = myRole === 'host' ? data.guestAnswer !== -999 : data.hostAnswer !== -999;
                    document.getElementById('opponent-status').innerText = oppDone ? '🟢 ส่งแล้ว' : '⏳ กำลังคิด...';
                    const bothDone = data.hostAnswer !== -999 && data.guestAnswer !== -999;
                    if (bothDone) evaluateWinner(data);
                }
            });
        }

        function hostTriggerStart() {
            const s = getGameSettings();
            const nums = generateNumbers(s.count);
            const tgt = generateTarget(s.minTarget, s.maxTarget);
            db.ref('rooms/' + roomCode).update({
                status: 'countdown',
                target: tgt,
                numbers: nums.join(','),
                hostAnswer: -999,
                guestAnswer: -999,
                hostExpr: '',
                guestExpr: ''
            });
        }

        function runCountdown(tgt, nums) {
            if (countdownRunning) return;
            countdownRunning = true;
            db.ref('rooms/' + roomCode).off('value');
            target = tgt;
            numbers = nums;
            changeScreen('screen-countdown');
            let count = 3;
            document.getElementById('countdown-number').innerText = count;
            const cd = setInterval(() => {
                count--;
                if (count > 0) {
                    document.getElementById('countdown-number').innerText = count;
                } else {
                    clearInterval(cd);
                    setupGameScreen();
                    if (isMultiplayer) {
                        db.ref('rooms/' + roomCode).update({ status: 'playing' });
                        listenToRoom();
                    }
                }
            }, 1000);
        }

        function leaveRoom() {
            if (roomCode) {
                db.ref('rooms/' + roomCode).off('value');
                if (myRole === 'host') db.ref('rooms/' + roomCode).remove();
                else db.ref('rooms/' + roomCode).update({ guestPresent: false, status: 'waiting' });
            }
            roomCode = '';
            clearInterval(gameTimer);
            changeScreen('screen-mode');
        }

        function backToMenu() {
            if (isMultiplayer && roomCode) leaveRoom();
            else changeScreen('screen-mode');
        }

        // ── Game Core (เกมคณิตคิดเร็วเดิม) ──

        function startSinglePlayerGame() {
            const s = getGameSettings();
            numbers = generateNumbers(s.count);
            target = generateTarget(s.minTarget, s.maxTarget);
            setupGameScreen();
        }

        function setupGameScreen() {
            countdownRunning = false;
            answered = false;
            myResult = null;
            const s = getGameSettings();
            timeLeft = s.time;

            document.getElementById('nums').textContent = numbers.join(', ');
            document.getElementById('target').textContent = target;
            document.getElementById('answer').value = '';
            document.getElementById('game-msg').textContent = '';
            document.getElementById('time').textContent = timeLeft;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('my-status').innerText = '⏳ กำลังคิด...';
            document.getElementById('opponent-status').innerText = isMultiplayer ? '⏳ กำลังคิด...' : '—';

            setupSymbols();
            setupNumberPad();
            changeScreen('screen-game');

            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameTimer);
                    submitAnswer(true);
                }
            }, 1000);
        }

        function setupSymbols() {
            const div = document.getElementById('symbols');
            div.innerHTML = '';
            const base = ['+', '-', '*', '/', '^', '(', ')'];
            base.forEach(sym => {
                div.innerHTML += `<button onclick="addSymbol('${sym}')">${sym}</button>`;
            });
            if (currentMode === 'advanced') {
                div.innerHTML += `<button onclick="addSymbol('!')">!</button>`;
                div.innerHTML += `<button onclick="addSymbol('√')">√</button>`;
            }
        }

        function setupNumberPad() {
            const pad = document.getElementById('numberPad');
            pad.innerHTML = '';
            for (let i = 1; i <= 9; i++) {
                pad.innerHTML += `<button onclick="addSymbol('${i}')">${i}</button>`;
            }
            pad.innerHTML += `<button onclick="deleteOne()">⌫</button>`;
        }

        function addSymbol(sym) {
            if (answered) return;
            document.getElementById('answer').value += sym;
        }

        function deleteOne() {
            if (answered) return;
            const box = document.getElementById('answer');
            box.value = box.value.slice(0, -1);
        }

        function factorial(n) {
            if (n < 0 || n > 6) throw new Error('Invalid factorial');
            let r = 1;
            for (let i = 2; i <= n; i++) r *= i;
            return r;
        }

        function validateNumbers(input) {
            const used = input.match(/\d+/g);
            if (!used) return false;
            const temp = [...numbers];
            for (const num of used) {
                const idx = temp.indexOf(parseInt(num, 10));
                if (idx === -1) return false;
                temp.splice(idx, 1);
            }
            return temp.length === 0;
        }

        function evaluateExpression(rawInput) {
            let input = rawInput;

            if (currentMode === 'advanced') {
                if ((input.match(/!/g) || []).length > 1 || (input.match(/√/g) || []).length > 1) {
                    throw new Error('ใช้ ! และ √ ได้อย่างละ 1 ครั้ง');
                }
                input = input.replace(/√(\d+)/g, 'Math.sqrt($1)');
                input = input.replace(/(\d+)!/g, 'factorial($1)');
            }

            input = input.replace(/\^/g, '**');
            return eval(input);
        }

        function submitAnswer(timedOut = false) {
            if (answered) return;

            const rawInput = document.getElementById('answer').value.trim();
            const msg = document.getElementById('game-msg');

            if (!timedOut && !rawInput) {
                msg.textContent = '❌ กรุณาสร้างสมการ';
                return;
            }

            if (!timedOut && !validateNumbers(rawInput)) {
                msg.textContent = '❌ ต้องใช้ตัวเลขจากชุดครบทุกตัว และใช้แต่ละตัวครั้งเดียว';
                return;
            }

            let value = null;
            if (rawInput) {
                try {
                    value = evaluateExpression(rawInput);
                } catch (e) {
                    msg.textContent = timedOut ? '' : ('❌ ' + (e.message || 'สมการไม่ถูกต้อง'));
                    if (!timedOut) return;
                }
            }

            answered = true;
            clearInterval(gameTimer);
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('my-status').innerText = timedOut && value === null ? '⏰ หมดเวลา' : '🟢 ส่งแล้ว';
            myResult = value;

            if (!isMultiplayer) {
                showSingleResult(rawInput, value, timedOut);
            } else {
                const update = {};
                if (myRole === 'host') {
                    update.hostAnswer = value === null ? -999999 : value;
                    update.hostExpr = rawInput;
                } else {
                    update.guestAnswer = value === null ? -999999 : value;
                    update.guestExpr = rawInput;
                }
                db.ref('rooms/' + roomCode).update(update);
            }
        }

        function showSingleResult(expr, value, timedOut) {
            let title, details;

            if (value === null || timedOut) {
                title = '⏰ หมดเวลา!';
                details = `เป้าหมาย: <b>${target}</b><br>ไม่ได้ส่งคำตอบที่ถูกต้อง`;
            } else {
                const diff = Math.abs(target - value);
                title = diff === 0 ? '🎯 PERFECT! ตรงเป้า!' : '🎉 จบรอบ!';
                details =
                    `สมการ: <b>${expr}</b><br>` +
                    `ผลลัพธ์: <b>${value}</b><br>` +
                    `เป้าหมาย: <b>${target}</b><br>` +
                    `ห่างจากเป้า: <b>${diff}</b> แต้ม`;
            }

            document.getElementById('result-text').innerText = title;
            document.getElementById('result-details').innerHTML = details;
            changeScreen('screen-result');
        }

        function evaluateWinner(data) {
            db.ref('rooms/' + roomCode).off('value');

            const hostVal = data.hostAnswer;
            const guestVal = data.guestAnswer;
            const hostDiff = hostVal === -999999 ? Infinity : Math.abs(data.target - hostVal);
            const guestDiff = guestVal === -999999 ? Infinity : Math.abs(data.target - guestVal);

            let title;
            if (hostDiff < guestDiff) {
                title = myRole === 'host' ? '👑 คุณชนะ!' : '❌ คุณแพ้';
            } else if (guestDiff < hostDiff) {
                title = myRole === 'guest' ? '👑 คุณชนะ!' : '❌ คุณแพ้';
            } else {
                title = '🤝 เสมอ!';
            }

            document.getElementById('result-text').innerText = title;
            document.getElementById('result-details').innerHTML =
                `🎯 เป้าหมาย: <b>${data.target}</b> | ตัวเลข: <b>${data.numbers}</b><br><br>` +
                `🔵 เจ้าของห้อง: <b>${data.hostExpr || '—'}</b> → ${hostVal === -999999 ? 'ไม่ส่ง' : hostVal} (ห่าง ${hostDiff === Infinity ? '—' : hostDiff})<br>` +
                `🔴 ผู้เข้าร่วม: <b>${data.guestExpr || '—'}</b> → ${guestVal === -999999 ? 'ไม่ส่ง' : guestVal} (ห่าง ${guestDiff === Infinity ? '—' : guestDiff})<br><br>` +
                `<i>ใครได้ผลลัพธ์ใกล้เป้าหมายที่สุด ชนะ!</i>`;

            changeScreen('screen-result');

            if (myRole === 'host') {
                db.ref('rooms/' + roomCode).update({
                    hostAnswer: -999,
                    guestAnswer: -999,
                    hostExpr: '',
                    guestExpr: '',
                    status: 'ready'
                });
            }
        }
    </script>

</body>
</html>
